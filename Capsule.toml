[package]
name = "astrid-capsule-agents"
version = "0.1.0"
description = "Injects project instructions from AGENTS.md into the system prompt"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "agents"
file = "astrid_capsule_agents.wasm"
type = "executable"
capabilities = { fs_read = ["cwd://"] }

[capabilities]
allow_prompt_injection = true
ipc_publish = ["prompt_builder.v1.hook_response.*"]

[env]
# Project folder name — set by the distro, not prompted during onboarding.
cwd_dir = { prompt = "Project folder name (e.g. .astrid)", secret = false }

[[interceptor]]
event = "prompt_builder.v1.hook.before_build"
action = "on_before_prompt_build"
